<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Empower Her by Jazz</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <img src="images/logo-main.png" class="nav-logo">

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <ul id="navLinks" class="nav-links">
    <li onclick="scrollToSection('about')">About</li>
    <li onclick="scrollToSection('services')">Services</li>
    <li onclick="scrollToSection('testimonials')">Testimonials</li>
    <li onclick="scrollToSection('query')">Query</li>
    <li onclick="scrollToSection('booking')">Book</li>
    <li onclick="scrollToSection('contact')">Contact</li>
  </ul>
</div>

<!-- HERO -->
<section class="hero">

<div class="slider">
  <img src="images/bg1.png" class="slide active">
  <img src="images/bg2.png" class="slide">
  <img src="images/bg3.png" class="slide">
</div>

<div class="overlay"></div>

<div class="hero-content">
  <img src="images/logo-full.png" class="hero-logo">

  <h1>Empower Her by Jazz</h1>
  <p class="tagline">Heal • Rise • Shine</p>

  <p>97117-71383</p>
  <p>70044-53676</p>

  <button class="btn" onclick="scrollToSection('booking')">Book Session</button>
</div>

</section>

<!-- SECTIONS -->
<section id="about" class="section"><h2>About</h2></section>
<section id="services" class="section"><h2>Services</h2></section>
<section id="testimonials" class="section"><h2>Testimonials</h2></section>

<section id="query" class="section">
  <h2>Drop Query</h2>
  <form class="form">
    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button class="btn">Submit</button>
  </form>
</section>

<section id="booking" class="section">
  <h2>Book Session</h2>
  <form class="form">
    <input type="text" placeholder="Name">
    <input type="tel" placeholder="Phone">
    <textarea placeholder="Concern"></textarea>
    <button class="btn">Submit</button>
  </form>

  <img src="images/qr.png" class="qr">
</section>

<section id="contact" class="section">
  <h2>Contact</h2>
  <p>97117-71383</p>
  <p>70044-53676</p>
</section>

<a onclick="openWhatsApp()" class="whatsapp">💬</a>

<script src="script.js"></script>

</body>
</html>
