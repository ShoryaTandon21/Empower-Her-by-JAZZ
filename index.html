<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Empower Her by Jazz</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
:root{
  --bg:#f8f9fd;
  --card:#ffffff;
  --text:#1c1c1c;
  --primary:#8E7CFF;
  --secondary:#FF9ECF;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:var(--bg);color:var(--text);}

.hero{
  height:90vh;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero img{
  position:absolute;
  width:100%;height:100%;
  object-fit:cover;
  opacity:0;
  transition:1s ease;
}
.hero img.active{opacity:1;}

.overlay{
  position:absolute;width:100%;height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(248,249,253,0.95));
}

.hero-content{position:relative;z-index:2;}

.tagline{
  font-size:14px;
  letter-spacing:5px;
  text-transform:uppercase;
  color:white;
  font-weight:800;
}
.tagline span{color:#FF9ECF;}

.hero h1{font-size:3rem;color:white;margin-top:10px;}
.hero p{color:#eee;margin-top:10px;}

.section{padding:70px 10%;}
.title{text-align:center;font-size:2rem;margin-bottom:40px;}

.services{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 15px 30px rgba(0,0,0,0.05);
  transition:.3s;
}
.card:hover{transform:translateY(-8px);}
.card img{width:100%;height:160px;object-fit:cover;}
.card h3{text-align:center;padding:15px;}

.booking{
  max-width:400px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.booking input,.booking textarea{
  width:100%;padding:12px;margin:10px 0;
  border:1px solid #ddd;border-radius:10px;
}

.booking button{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:linear-gradient(90deg,var(--primary),var(--secondary));
  color:white;font-weight:bold;cursor:pointer;
}

.whatsapp{
  position:fixed;bottom:20px;right:20px;
  background:#25D366;color:white;padding:14px;
  border-radius:50px;text-decoration:none;
}

.popup{
  position:fixed;top:20px;right:20px;
  background:white;padding:15px;border-radius:10px;
  display:none;
}
</style>
</head>
<body>

<a class="whatsapp" href="https://wa.me/919999999999" target="_blank">Chat</a>
<div class="popup" id="popup">Booking Successful ✅</div>

<div class="hero">
<div class="overlay"></div>

<img src="https://picsum.photos/1600/900?woman,fitness" class="active">
<img src="https://picsum.photos/1600/900?yoga,woman">
<img src="https://picsum.photos/1600/900?wellness,women">

<div class="hero-content">
<div class="tagline">Empower Her by <span>JAZZ</span></div>
<h1>Transform Your Lifestyle</h1>
<p>Women Wellness & Coaching Platform</p>
</div>
</div>

<div class="section">
<h2 class="title">Our Services</h2>
<div class="services">
<div class="card"><img src="https://picsum.photos/400/300?gym,women"><h3>Personal Training</h3></div>
<div class="card"><img src="https://picsum.photos/400/300?weightloss"><h3>Weight Loss</h3></div>
<div class="card"><img src="https://picsum.photos/400/300?diet"><h3>Diet Planning</h3></div>
<div class="card"><img src="https://picsum.photos/400/300?online,coaching"><h3>Online Coaching</h3></div>
</div>
</div>

<div class="section">
<h2 class="title">Book Session</h2>
<div class="booking">
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<textarea id="goal" placeholder="Your Goal"></textarea>
<button onclick="payNow()">Pay & Book ₹999</button>
</div>
</div>

<script>
let slides=document.querySelectorAll('.hero img');
let i=0;
setInterval(()=>{
slides[i].classList.remove('active');
i=(i+1)%slides.length;
slides[i].classList.add('active');
},3000);

function payNow(){
const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const goal=document.getElementById("goal").value;

if(!name||!email||!goal){alert("Fill all fields");return;}

const options={
key:"rzp_test_SiSYqtmRzqf664",
amount:99900,
currency:"INR",
name:"Empower Her by Jazz",
handler:function(){
let popup=document.getElementById("popup");
popup.style.display="block";
setTimeout(()=>popup.style.display="none",2500);
}
};

const rzp=new Razorpay(options);
rzp.open();
}
</script>

</body>
</html>
