<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Empower Her by Jazz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <img src="images/logo-main.png" alt="logo">
  </div>

  <!-- HERO -->
  <section class="hero">

    <!-- SLIDER -->
    <div class="slider">
      <img src="images/bg1.jpg" class="slide active">
      <img src="images/bg2.jpg" class="slide">
      <img src="images/bg3.jpg" class="slide">
    </div>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- CONTENT -->
    <div class="hero-content">

      <img src="images/logo-full.png" class="hero-logo">

      <h1>Empower Her by Jazz</h1>
      <p class="tagline">Heal • Rise • Shine</p>

      <div class="contact">
        <p>1234567897</p>
        <p>1234567898</p>
      </div>

      <button class="btn">Book Now</button>

    </div>

  </section>

  <script src="script.js"></script>

</body>
</html>
